<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<title>خبر</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="article"></div>

<script>

fetch("news.json")
.then(res=>res.json())
.then(news=>{

let id = new URLSearchParams(location.search).get("id");

let item = news.find(n=>n.id == id);

if(!item){

document.getElementById("article").innerHTML=
"<h2>خبر پیدا نشد</h2>";

return;

}

document.getElementById("article").innerHTML=`

<div class="card">

<img src="${item.image}" class="news-image">

<h1>${item.title}</h1>

<p>${item.date}</p>

<p>${item.content}</p>

</div>

`;

});

</script>

</body>
</html>
